<!DOCTYPE html>
<html lang="el">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Easy Order</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/polyfills.umd.js"></script>
  
  
</head>


<body>


<header>

<h1>FÖRCH</h1>

<p>Easy Order</p>

</header>




<section>

<h2>Στοιχεία Παραγγελίας</h2>


<label>Ημερομηνία</label>
<input type="date" id="date">


<label>Περιοχή</label>
<input type="text" id="area" placeholder="Περιοχή">


<label>Πελάτης</label>
<input type="text" id="customer" placeholder="Επωνυμία πελάτη">

  

</section>





<section>


<h2>Προϊόντα</h2>


<table>


<thead>

<tr>

<th>Κωδικός</th>
<th>Περιγραφή</th>
<th>Ποσ.</th>
<th>Αρχική</th>
<th>Έκπτωση</th>
<th>Τελική</th>

</tr>

</thead>



<tbody id="products">



<tr>


<td>

<input 
type="text"
class="code"
placeholder="Κωδικός"
onblur="findProduct(this)">

</td>




<td>


<input 
type="text"
class="description"
placeholder="Περιγραφή"
oninput="searchDescription(this)">


<div class="suggestions"></div>


</td>




<td>

<input
type="number"
class="quantity"
value="1"
oninput="calculateRow(this.closest('tr'))">

</td>




<td>

<input
type="number"
class="price"
placeholder="0.00"
oninput="calculateRow(this.closest('tr'))">

</td>




<td>

<input
type="number"
class="discount"
placeholder="%"
oninput="calculateRow(this.closest('tr'))">

</td>




<td>

<input
type="number"
class="finalPrice"
readonly>

</td>



</tr>


</tbody>


</table>



<button onclick="addProduct()">
+ Προσθήκη προϊόντος
</button>
 
  <label>Παρατηρήσεις</label>

<textarea 
id="notes"
placeholder="Προαιρετικές παρατηρήσεις παραγγελίας"
rows="3">
</textarea>

</section>






<section>


<h2>Σύνολο</h2>


<h3 id="total">

0,00 €

</h3>



</section>






<section>


<h2>Αποθήκευση</h2>



<button onclick="saveDraft()">

💾 Αποθήκευση πρόχειρης

</button>



<button onclick="showDrafts()">

📂 Πρόχειρες παραγγελίες

</button>



<div id="draftList"></div>



</section>





<script src="data.js"></script>

<script src="products.js"></script>

<script src="orders.js"></script>

<script src="storage.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script src="fonts.js"></script>
  
<script src="pdf.js"></script>

<script src="app.js"></script>


</body>


</html>
