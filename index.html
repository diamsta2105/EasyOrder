<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Easy Order</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<header>
    <h1>FÖRCH</h1>
    <p>Παραγγελιοληψία Πωλητή</p>
</header>



<section>

<h2>Στοιχεία Παραγγελίας</h2>

<label>Ημερομηνία</label>
<input type="date" id="date">


<label>Περιοχή</label>
<input type="text" id="area" placeholder="Περιοχή">


<label>Πελάτης</label>
<input type="text" id="customer" placeholder="Επωνυμία πελάτη">


</section>




<section>

<h2>Προϊόντα</h2>


<table>

<thead>

<tr>
<th>Κωδικός</th>
<th>Περιγραφή</th>
<th>Ποσ.</th>
<th>Αρχική Τιμή</th>
<th>Έκπτωση</th>
<th>Τελική Τιμή</th>
</tr>

</thead>


<tbody id="products">

<tr>

<td><input type="text" placeholder="Κωδικός"></td>

<td><input type="text" placeholder="Περιγραφή"></td>

<td><input type="number" value="1"></td>

<td><input type="number" placeholder="0.00"></td>

<td><input type="number" placeholder="%"></td>

<td><input type="number" placeholder="0.00"></td>

</tr>


</tbody>


</table>


<button onclick="addProduct()">
+ Προσθήκη προϊόντος
</button>


</section>




<section>

<h2>Σύνολο Παραγγελίας</h2>


<p>
Τελικό ποσό:
<strong id="total">
0,00 €
</strong>
</p>


</section>




<section>

<h2>Σύνολο Ημέρας</h2>


<p>
Παραγγελίες σήμερα:
<strong id="dayOrders">
0
</strong>
</p>


<p>
Τζίρος σήμερα:
<strong id="dayTotal">
0,00 €
</strong>
</p>


</section>




<script src="app.js"></script>


</body>

</html>
