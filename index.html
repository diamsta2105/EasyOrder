<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Easy Order</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<header>
    <h1>FÖRCH</h1>
    <p>Easy Order</p>
</header>



<section>

<h2>Στοιχεία Παραγγελίας</h2>


<label>Ημερομηνία</label>
<input type="date" id="date">


<label>Περιοχή</label>
<input type="text" id="area" placeholder="Περιοχή">


<label>Πελάτης</label>
<input type="text" id="customer" placeholder="Επωνυμία πελάτη">



</section>




<section>

<h2>Προϊόντα</h2>


<table>

<thead>

<tr>
<th>Κωδικός</th>
<th>Περιγραφή</th>
<th>Ποσ.</th>
<th>Αρχική</th>
<th>Έκπτωση</th>
<th>Τελική</th>
</tr>

</thead>


<tbody id="products">


<tr>

<td>
<input 
type="text" 
class="code"
placeholder="Κωδικός"
onblur="findProduct(this)">
</td>


<td>
<input 
type="text"
class="description"
placeholder="Περιγραφή">
</td>


<td>
<input 
type="number"
class="quantity"
value="1"
oninput="calculateTotal()">
</td>


<td>
<input 
type="number"
class="price"
placeholder="0.00"
oninput="calculateTotal()">
</td>


<td>
<input 
type="number"
class="discount"
placeholder="%"
oninput="calculateTotal()">
</td>


<td>
<input 
type="number"
class="finalPrice"
placeholder="0.00"
readonly>
</td>


</tr>


</tbody>


</table>



<button onclick="addProduct()">
+ Προσθήκη προϊόντος
</button>



</section>





<section>

<h2>Σύνολο Παραγγελίας</h2>


<p>
Τελικό ποσό:
<strong id="total">
0,00 €
</strong>
</p>


</section>





<section>

<h2>Σύνολο Ημέρας</h2>


<p>
Παραγγελίες σήμερα:
<strong id="dayOrders">
0
</strong>
</p>


<p>
Τζίρος σήμερα:
<strong id="dayTotal">
0,00 €
</strong>
</p>


</section>





<script src="data.js"></script>
<script src="app.js"></script>


</body>

</html>
